<!DOCTYPE html>
<html>
<head>
    <style>
        /* Le boîtier de la calculatrice */
        .calculator {
            width: 300px;
            margin: 50px auto;
            padding: 20px;
            background-color: #333;
            border-radius: 15px;
            box-shadow: 0px 10px 20px rgba(0,0,0,0.3);
        }

        /* L'écran d'affichage */
        #display {
            width: 100%;
            height: 50px;
            font-size: 24px;
            text-align: right;
            margin-bottom: 20px;
            padding: 10px;
            box-sizing: border-box;
            border: none;
            border-radius: 5px;
            background: #eee;
        }

        /* Grille pour les boutons (4 colonnes) */
        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        /* Style de vos boutons */
        button {
            padding: 20px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background-color: #555;
            color: white;
            transition: background 0.2s;
        }

        button:hover { background-color: #777; }
        button:active { transform: scale(0.95); }

        /* Couleurs spéciales pour les opérateurs */
        .operator { background-color: #f39c12; }
        .operator:hover { background-color: #e67e22; }
        .equal { background-color: #27ae60; grid-column: span 2; }
        .clear { background-color: #c0392b; grid-column: span 2; }
    </style>
</head>
<body>

<div class="calculator">
    <!-- Écran -->
    <input type="text" id="display" disabled>

    <!-- Touches -->
    <div class="buttons-grid">
        <button class="clear" onclick="clearDisplay()">C</button>
        <button class="operator" onclick="addToDisplay('/')">/</button>
        <button class="operator" onclick="addToDisplay('*')">×</button>
        
        <button onclick="addToDisplay('7')">7</button>
        <button onclick="addToDisplay('8')">8</button>
        <button onclick="addToDisplay('9')">9</button>
        <button class="operator" onclick="addToDisplay('-')">-</button>
        
        <button onclick="addToDisplay('4')">4</button>
        <button onclick="addToDisplay('5')">5</button>
        <button onclick="addToDisplay('6')">6</button>
        <button class="operator" onclick="addToDisplay('+')">+</button>
        
        <button onclick="addToDisplay('1')">1</button>
        <button onclick="addToDisplay('2')">2</button>
        <button onclick="addToDisplay('3')">3</button>
        <button onclick="addToDisplay('.')">.</button>
        <button class="equal" onclick="calculate()">=</button>
        
        <button onclick="addToDisplay('0')" style="grid-column: span 2;">0</button>
    </div>
</div>

<script>
    const display = document.getElementById('display');

    // Ajoute un chiffre ou un signe à l'écran
    function addToDisplay(value) {
        display.value += value;
    }

    // Efface tout l'écran
    function clearDisplay() {
        display.value = '';
    }

    // Fait le calcul mathématique automatiquement
    function calculate() {
        try {
            // eval() analyse la chaîne de texte et calcule le résultat
            display.value = eval(display.value);
        } catch (error) {
            display.value = "Erreur";
        }
    }
</script>

</body>
</html>
